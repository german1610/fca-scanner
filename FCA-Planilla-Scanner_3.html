<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FCA – Planilla de Bonos</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');

  :root {
    --red: #C8102E;
    --dark: #0D0D0D;
    --mid: #1A1A1A;
    --panel: #242424;
    --border: #333;
    --text: #F0F0F0;
    --muted: #888;
    --green: #00C875;
    --yellow: #FFD700;
    --blue: #3A8FFF;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  header {
    background: var(--mid);
    border-bottom: 3px solid var(--red);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 22px;
    color: var(--red);
    letter-spacing: 2px;
  }

  header h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--text);
    line-height: 1.1;
  }

  header .sub { font-size: 11px; color: var(--muted); font-weight: 400; }

  .row-count {
    margin-left: auto;
    background: var(--red);
    color: #fff;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 20px;
    padding: 4px 12px;
    border-radius: 4px;
  }

  /* ─── FORM ─── */
  .form-section {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin: 16px;
    padding: 16px;
  }

  .form-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .field-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }

  .field-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 1px;
    color: var(--muted);
    width: 100px;
    flex-shrink: 0;
    text-transform: uppercase;
  }

  .field-input {
    flex: 1;
    background: var(--mid);
    border: 1.5px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 600;
    padding: 9px 12px;
    outline: none;
    transition: border-color .2s;
    letter-spacing: 1px;
  }

  .field-input:focus {
    border-color: var(--blue);
    background: #1e2a38;
  }

  .field-input.filled {
    border-color: var(--green);
    color: var(--green);
  }

  .scan-btn {
    background: var(--red);
    border: none;
    border-radius: 6px;
    color: #fff;
    font-size: 20px;
    width: 44px;
    height: 44px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background .15s, transform .1s;
  }

  .scan-btn:active { background: #a00020; transform: scale(.96); }

  .ubicacion-input {
    font-size: 15px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .add-btn {
    width: 100%;
    background: var(--green);
    color: #000;
    border: none;
    border-radius: 8px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 20px;
    letter-spacing: 2px;
    padding: 14px;
    cursor: pointer;
    margin-top: 6px;
    transition: background .15s, transform .1s;
    text-transform: uppercase;
  }

  .add-btn:active { background: #00a05e; transform: scale(.98); }
  .add-btn:disabled { background: #444; color: #666; cursor: not-allowed; }

  /* ─── CAMERA OVERLAY ─── */
  .cam-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.96);
    z-index: 999;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .cam-overlay.active { display: flex; }

  .cam-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .cam-target-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 24px;
    color: var(--yellow);
    letter-spacing: 2px;
    margin-bottom: 16px;
  }

  #videoEl {
    width: min(100vw, 420px);
    height: 300px;
    object-fit: cover;
    border-radius: 10px;
    border: 2px solid var(--border);
  }

  .scan-frame {
    position: absolute;
    width: min(100vw, 420px);
    height: 300px;
    pointer-events: none;
  }

  .scan-line {
    position: absolute;
    left: 10%;
    right: 10%;
    height: 2px;
    background: var(--red);
    top: 50%;
    animation: scanMove 1.8s ease-in-out infinite;
    box-shadow: 0 0 8px var(--red);
  }

  @keyframes scanMove {
    0%,100% { top: 20%; }
    50% { top: 80%; }
  }

  .cam-hint {
    color: var(--muted);
    font-size: 13px;
    margin-top: 14px;
    text-align: center;
    padding: 0 20px;
  }

  .cam-close {
    margin-top: 20px;
    background: var(--panel);
    border: 1.5px solid var(--border);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    letter-spacing: 1px;
    font-weight: 700;
    padding: 10px 30px;
    border-radius: 8px;
    cursor: pointer;
  }

  .cam-result {
    margin-top: 12px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--green);
    letter-spacing: 2px;
    min-height: 30px;
  }

  /* ─── TABLE ─── */
  .table-section {
    margin: 0 16px;
  }

  .table-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .table-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .export-btn {
    background: var(--yellow);
    color: #000;
    border: none;
    border-radius: 6px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 13px;
    letter-spacing: 1px;
    padding: 7px 14px;
    cursor: pointer;
    text-transform: uppercase;
    transition: background .15s;
  }

  .export-btn:active { background: #e6c000; }
  .export-btn:disabled { background: #444; color: #666; cursor: not-allowed; }

  .wa-btn {
    background: #25D366;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 13px;
    letter-spacing: 1px;
    padding: 7px 14px;
    cursor: pointer;
    text-transform: uppercase;
    transition: background .15s;
    display: flex;
    align-items: center;
  }
  .wa-btn:active { background: #1da851; }
  .wa-btn:disabled { background: #444; color: #666; cursor: not-allowed; }

  .clear-btn {
    background: transparent;
    color: var(--red);
    border: 1.5px solid var(--red);
    border-radius: 6px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 1px;
    padding: 6px 12px;
    cursor: pointer;
    text-transform: uppercase;
    margin-left: 8px;
  }

  .table-wrap {
    overflow-x: auto;
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 520px;
  }

  thead tr {
    background: var(--mid);
    border-bottom: 2px solid var(--red);
  }

  th {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    padding: 10px 12px;
    text-align: left;
    white-space: nowrap;
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background .15s;
  }

  tbody tr:hover { background: var(--panel); }
  tbody tr:last-child { border-bottom: none; }

  td {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 600;
    padding: 10px 12px;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  td.code { color: var(--blue); }
  td.ubicacion { color: var(--yellow); font-size: 13px; }
  td.hora { color: var(--muted); font-size: 12px; }

  .del-cell { text-align: center; width: 36px; }
  .del-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 16px;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 4px;
    transition: color .15s;
  }
  .del-btn:hover { color: var(--red); }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    letter-spacing: 1px;
  }

  /* ─── TOAST ─── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--green);
    color: #000;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 16px;
    letter-spacing: 1px;
    padding: 12px 24px;
    border-radius: 8px;
    z-index: 9999;
    transition: transform .3s cubic-bezier(.34,1.56,.64,1);
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--red); color: #fff; }

  .obs-input {
    font-size: 14px;
    resize: vertical;
    min-height: 68px;
    line-height: 1.4;
    font-family: 'Barlow', sans-serif;
    font-weight: 400;
    letter-spacing: 0;
  }
</style>
</head>
<body>

<header>
  <div class="logo">FCA</div>
  <div>
    <h1>PLANILLA DE BONOS</h1>
    <div class="sub">MASTER CIM · CIM · UBICACION · DIA/HORA</div>
  </div>
  <div class="row-count" id="rowCount">0</div>
</header>

<!-- FORM -->
<div class="form-section">
  <div class="form-title">▸ Nuevo Registro</div>

  <div class="field-row">
    <div class="field-label">Master CIM</div>
    <input type="text" id="masterCimInput" class="field-input" placeholder="Escanear o tipear…" inputmode="numeric" autocomplete="off">
    <button class="scan-btn" onclick="openCamera('masterCim')" title="Escanear MASTER CIM">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
        <rect x="3" y="3" width="5" height="5" rx="1"/><rect x="16" y="3" width="5" height="5" rx="1"/>
        <rect x="3" y="16" width="5" height="5" rx="1"/>
        <line x1="16" y1="16" x2="21" y2="16"/><line x1="19" y1="16" x2="19" y2="21"/>
        <line x1="12" y1="3" x2="12" y2="7"/><line x1="12" y1="10" x2="12" y2="12"/>
        <line x1="3" y1="12" x2="7" y2="12"/><line x1="16" y1="12" x2="21" y2="12"/>
      </svg>
    </button>
  </div>

  <div class="field-row">
    <div class="field-label">CIM</div>
    <input type="text" id="cimInput" class="field-input" placeholder="Escanear o tipear…" inputmode="numeric" autocomplete="off">
    <button class="scan-btn" onclick="openCamera('cim')" title="Escanear CIM">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
        <rect x="3" y="3" width="5" height="5" rx="1"/><rect x="16" y="3" width="5" height="5" rx="1"/>
        <rect x="3" y="16" width="5" height="5" rx="1"/>
        <line x1="16" y1="16" x2="21" y2="16"/><line x1="19" y1="16" x2="19" y2="21"/>
        <line x1="12" y1="3" x2="12" y2="7"/><line x1="12" y1="10" x2="12" y2="12"/>
        <line x1="3" y1="12" x2="7" y2="12"/><line x1="16" y1="12" x2="21" y2="12"/>
      </svg>
    </button>
  </div>

  <div class="field-row">
    <div class="field-label">Ubicación</div>
    <input type="text" id="ubicInput" class="field-input ubicacion-input" placeholder="ESTAP.K.01.03.02" autocomplete="off">
  </div>


  <div class="field-row" style="align-items:flex-start">
    <div class="field-label" style="padding-top:10px">⚠ OBS.</div>
    <textarea id="obsInput" class="field-input obs-input" placeholder="Ej: Bulto dañado, faltante de piezas, demora en entrega…" rows="3" autocomplete="off"></textarea>
  </div>

  <button class="add-btn" id="addBtn" onclick="addRow()">+ AGREGAR REGISTRO</button>
</div>

<!-- TABLE -->
<div class="table-section">
  <div class="table-header">
    <div class="table-title">▸ Registros</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end">
      <button class="export-btn" id="exportBtn" onclick="exportExcel()" disabled>⬇ EXCEL</button>
      <button class="wa-btn" id="waBtn" onclick="shareWhatsApp()" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:middle;margin-right:4px"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        WHATSAPP
      </button>
      <button class="clear-btn" onclick="clearAll()">🗑</button>
    </div>
  </div>
  <div class="table-wrap">
    <table id="dataTable">
      <thead>
        <tr>
          <th>#</th>
          <th>MASTER CIM</th>
          <th>CIM</th>
          <th>UBICACION</th>
          <th>DIA</th>
          <th>HORA</th>
          <th>OBS</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="8" class="empty-state">Sin registros todavía</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- CAMERA OVERLAY -->
<div class="cam-overlay" id="camOverlay">
  <div class="cam-title">📷 ESCANEAR CÓDIGO</div>
  <div class="cam-target-label" id="camTargetLabel">MASTER CIM</div>
  <div id="qr-reader" style="width:min(92vw,400px);border-radius:10px;overflow:hidden;"></div>
  <div class="cam-result" id="camResult"></div>
  <div class="cam-hint">Apuntá la cámara al código de barras del bono</div>
  <button class="cam-close" onclick="closeCamera()">✕ CERRAR</button>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- SheetJS for Excel export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<!-- html5-qrcode: máxima compatibilidad iOS Safari + Android Chrome -->
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<script>
  let rows = JSON.parse(localStorage.getItem('fcaBonos') || '[]');
  let currentTarget = null;

  // ─── INPUTS ───
  const masterInput = document.getElementById('masterCimInput');
  const cimInput    = document.getElementById('cimInput');
  const ubicInput   = document.getElementById('ubicInput');
  const obsInput    = document.getElementById('obsInput');

  [masterInput, cimInput, ubicInput, obsInput].forEach(el => {
    el.addEventListener('input', () => {
      el.classList.toggle('filled', el.value.trim().length > 0);
    });
  });

  // ─── ADD ROW ───
  function addRow() {
    const master = masterInput.value.trim();
    const cim    = cimInput.value.trim();
    const ubic   = ubicInput.value.trim().toUpperCase();
    const obs    = obsInput.value.trim();

    if (!master || !cim) { showToast('Falta MASTER CIM o CIM', true); return; }

    const now  = new Date();
    const dia  = now.toLocaleDateString('es-AR', { day:'2-digit', month:'2-digit', year:'numeric' });
    const hora = now.toLocaleTimeString('es-AR', { hour:'2-digit', minute:'2-digit', second:'2-digit' });

    rows.push({ master, cim, ubic: ubic || '—', obs: obs || '', dia, hora });
    saveAndRender();

    masterInput.value = ''; cimInput.value = ''; ubicInput.value = ''; obsInput.value = '';
    [masterInput, cimInput, ubicInput, obsInput].forEach(e => e.classList.remove('filled'));
    showToast('✔ Registro agregado');
    masterInput.focus();
  }

  // ─── DELETE ───
  function deleteRow(i) {
    rows.splice(i, 1);
    saveAndRender();
  }

  function clearAll() {
    if (rows.length === 0) return;
    if (!confirm(`¿Borrar los ${rows.length} registros?`)) return;
    rows = [];
    saveAndRender();
  }

  // ─── RENDER ───
  function saveAndRender() {
    localStorage.setItem('fcaBonos', JSON.stringify(rows));
    const tbody = document.getElementById('tableBody');
    document.getElementById('rowCount').textContent = rows.length;
    document.getElementById('exportBtn').disabled = rows.length === 0;
    document.getElementById('waBtn').disabled = rows.length === 0;

    if (rows.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty-state">Sin registros todavía</td></tr>';
      return;
    }

    tbody.innerHTML = rows.map((r, i) => `
      <tr>
        <td style="color:var(--muted);font-size:12px">${i+1}</td>
        <td class="code">${r.master}</td>
        <td class="code">${r.cim}</td>
        <td class="ubicacion">${r.ubic}</td>
        <td class="hora">${r.dia}<br><span style="color:var(--green);font-size:13px">${r.hora}</span></td>
        <td style="font-size:12px;max-width:140px;white-space:normal;line-height:1.4;padding:8px 10px">
          ${r.obs
            ? `<span style="color:var(--yellow);font-weight:600">⚠ ${r.obs}</span>`
            : `<span style="color:var(--border)">—</span>`
          }
        </td>
        <td class="del-cell"><button class="del-btn" onclick="deleteRow(${i})">✕</button></td>
      </tr>
    `).join('');
  }

  // ─── EXPORT EXCEL ───
  function exportExcel() {
    try {
      const data = [['MASTER CIM', 'CIM', 'UBICACION', 'DIA', 'HORA', 'OBSERVACION'],
        ...rows.map(r => [r.master, r.cim, r.ubic, r.dia, r.hora, r.obs || ''])];

      const ws = XLSX.utils.aoa_to_sheet(data);
      ws['!cols'] = [{ wch: 18 }, { wch: 18 }, { wch: 22 }, { wch: 14 }, { wch: 12 }, { wch: 30 }];

      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Bonos');

      // Generar el archivo como array de bytes
      const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
      const blob  = new Blob([wbout], { type: 'application/octet-stream' });

      const fecha = new Date().toLocaleDateString('es-AR').replace(/\//g,'-');
      const nombre = `FCA-Bonos-${fecha}.xlsx`;

      // Método compatible con todos los navegadores móviles
      const url = URL.createObjectURL(blob);
      const a   = document.createElement('a');
      a.href     = url;
      a.download = nombre;
      document.body.appendChild(a);
      a.click();
      setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1500);

      showToast('📥 Descargando ' + nombre);
    } catch(e) {
      console.error(e);
      showToast('⚠ Error al generar Excel', true);
    }
  }

  // ─── WHATSAPP SHARE ───
  function shareWhatsApp() {
    if (rows.length === 0) return;

    const fecha = new Date().toLocaleDateString('es-AR', { day:'2-digit', month:'2-digit', year:'numeric' });
    const hora  = new Date().toLocaleTimeString('es-AR', { hour:'2-digit', minute:'2-digit' });

    let msg = `📋 *FCA – PLANILLA DE BONOS*\n`;
    msg    += `📅 ${fecha}  🕐 ${hora}\n`;
    msg    += `📦 Total registros: ${rows.length}\n`;
    msg    += `${'─'.repeat(30)}\n\n`;

    rows.forEach((r, i) => {
      msg += `*#${i+1}*\n`;
      msg += `• Master CIM: \`${r.master}\`\n`;
      msg += `• CIM: \`${r.cim}\`\n`;
      msg += `• Ubicación: ${r.ubic}\n`;
      msg += `• Fecha/Hora: ${r.dia} ${r.hora}\n`;
      if (r.obs) msg += `⚠ *Observación:* ${r.obs}\n`;
      msg += `\n`;
    });

    msg += `_Enviado desde FCA Planilla Scanner_`;

    const url = 'https://wa.me/?text=' + encodeURIComponent(msg);
    window.open(url, '_blank');
  }

  // ─── CAMERA ───
  let html5QrCode = null;

  function openCamera(target) {
    currentTarget = target;
    const label = target === 'masterCim' ? 'MASTER CIM' : 'CIM';
    document.getElementById('camTargetLabel').textContent = `▸ ESCANEANDO: ${label}`;
    const resultEl = document.getElementById('camResult');
    resultEl.textContent = '⏳ Iniciando cámara…';
    resultEl.style.color = 'var(--text)';
    document.getElementById('camOverlay').classList.add('active');
    startScanner();
  }

  function startScanner() {
    const resultEl = document.getElementById('camResult');

    // Limpiar instancia anterior
    if (html5QrCode) {
      html5QrCode.stop().catch(() => {}).finally(() => {
        html5QrCode.clear();
        html5QrCode = null;
        iniciarHtml5QrCode(resultEl);
      });
    } else {
      iniciarHtml5QrCode(resultEl);
    }
  }

  function iniciarHtml5QrCode(resultEl) {
    html5QrCode = new Html5Qrcode("qr-reader");

    const config = {
      fps: 10,
      qrbox: { width: 280, height: 140 },
      aspectRatio: 1.7,
      supportedScanTypes: [
        Html5QrcodeScanType.SCAN_TYPE_CAMERA
      ],
      formatsToSupport: [
        Html5QrcodeSupportedFormats.CODE_128,
        Html5QrcodeSupportedFormats.CODE_39,
        Html5QrcodeSupportedFormats.EAN_13,
        Html5QrcodeSupportedFormats.EAN_8,
        Html5QrcodeSupportedFormats.UPC_A,
        Html5QrcodeSupportedFormats.CODABAR
      ]
    };

    html5QrCode.start(
      { facingMode: "environment" },
      config,
      (decodedText) => {
        // ✅ Código leído con éxito
        resultEl.style.color = 'var(--green)';
        resultEl.textContent = '✔ ' + decodedText;

        if (currentTarget === 'masterCim') {
          masterInput.value = decodedText;
          masterInput.classList.add('filled');
        } else {
          cimInput.value = decodedText;
          cimInput.classList.add('filled');
        }

        if (navigator.vibrate) navigator.vibrate(120);
        setTimeout(() => closeCamera(), 800);
      },
      () => {
        // Frame sin código — normal, no hacer nada
      }
    ).then(() => {
      resultEl.textContent = '🔍 Apuntá al código de barras…';
      resultEl.style.color = 'var(--muted)';
    }).catch((err) => {
      console.error('Error cámara:', err);
      resultEl.style.color = 'var(--yellow)';
      if (err.toString().includes('NotAllowed') || err.toString().includes('Permission')) {
        resultEl.innerHTML = '🔒 Permiso denegado.<br><small>Ir a Configuración → Safari/Chrome → Cámara → Permitir</small>';
      } else if (err.toString().includes('NotFound')) {
        resultEl.innerHTML = '📷 No se encontró cámara trasera.';
      } else if (err.toString().includes('NotReadable') || err.toString().includes('in use')) {
        resultEl.innerHTML = '⚠ Cámara ocupada por otra app.<br><small>Cerrá otras apps y volvé a intentar.</small>';
      } else {
        resultEl.innerHTML = '⚠ No se pudo iniciar la cámara.<br><small>' + err + '</small>';
      }
    });
  }

  function closeCamera() {
    document.getElementById('camOverlay').classList.remove('active');
    if (html5QrCode) {
      html5QrCode.stop().catch(() => {}).finally(() => {
        html5QrCode.clear();
        html5QrCode = null;
        document.getElementById('camResult').textContent = '';
      });
    }
  }

  // ─── TOAST ───
  let toastTimer;
  function showToast(msg, error = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (error ? ' error' : '');
    requestAnimationFrame(() => t.classList.add('show'));
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
  }

  // ─── INIT ───
  saveAndRender();
</script>
</body>
</html>
